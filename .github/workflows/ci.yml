name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Placeholder ──────────────────────────────────────────────
  placeholder:
    name: CI placeholder (Phase 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci || echo "No package-lock.json yet — skipping install"
      - name: Echo status
        run: echo "CI pipeline active. Full checks coming in Phase 2."

